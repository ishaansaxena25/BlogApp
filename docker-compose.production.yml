# ============================================
# BlogBubble — VPS Production (MODE 2)
# Usage: docker compose -f docker-compose.production.yml up --build -d
# ============================================

services:
  # ---------- Backend (Node.js / Express) ----------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogbubble-backend
    expose:
      - "3000"
    env_file:
      - .env.production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - blog_uploads:/app/public/uploads
      - profile_uploads:/app/public/profile
    restart: unless-stopped
    networks:
      - blogbubble-net

  # ---------- MongoDB (Internal only — no host port) ----------
  mongodb:
    image: mongo:7
    container_name: blogbubble-mongodb
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_INITDB_ROOT_USERNAME}", "-p", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - blogbubble-net

  # ---------- Redis (Internal only — password protected) ----------
  redis:
    image: redis:7-alpine
    container_name: blogbubble-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - blogbubble-net

  # ---------- Nginx Reverse Proxy + SSL ----------
  nginx:
    image: nginx:alpine
    container_name: blogbubble-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - blogbubble-net

# ---------- Named Volumes ----------
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  blog_uploads:
    driver: local
  profile_uploads:
    driver: local

# ---------- Networks ----------
networks:
  blogbubble-net:
    driver: bridge
