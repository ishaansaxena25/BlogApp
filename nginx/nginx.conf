# ============================================================
# BlogBubble — Nginx Reverse Proxy Configuration
# ============================================================
# This config is used in production (VPS / Cloud) to:
#   1. Terminate SSL (HTTPS)
#   2. Reverse-proxy API requests to the Express backend
#   3. Serve uploaded static files with caching headers
#   4. Add security headers
#
# The FRONTEND is hosted separately (e.g., Vercel, Netlify),
# so this nginx does NOT serve any frontend files.
#
# For LOCAL DEVELOPMENT with docker-compose, this nginx config
# is NOT used — the backend and frontend run on their own ports.
#
# ============================================================
# INITIAL SETUP (no SSL yet):
#   1. Start with only the HTTP server block (uncommented below).
#   2. Obtain SSL certs (e.g., via Certbot / Let's Encrypt).
#   3. Place certs at /etc/nginx/ssl/cert.pem and key.pem.
#   4. Uncomment the HTTPS server block.
#   5. Uncomment the HTTP→HTTPS redirect in the HTTP block.
#   6. Reload nginx: docker-compose exec nginx nginx -s reload
# ============================================================

# ----- Upstream: Backend API Server -----
# Define the backend as an upstream so it can be referenced
# by name. "backend" is the Docker Compose service name.
upstream backend_server {
    server backend:3000;
}

# ============================================================
# HTTP Server — Port 80
# ============================================================
server {
    listen 80;
    listen [::]:80;

    # Replace with your actual domain name(s).
    server_name yourdomain.com www.yourdomain.com;

    # ----------------------------------------------------------
    # Option A: Redirect ALL HTTP traffic to HTTPS
    # ----------------------------------------------------------
    # ⚠️  Uncomment the lines below AFTER you have obtained
    #     SSL certificates and enabled the HTTPS server block.
    #
    # return 301 https://$host$request_uri;

    # ----------------------------------------------------------
    # Option B: Serve without SSL (initial setup / testing)
    # ----------------------------------------------------------
    # This lets you verify the backend is reachable before
    # configuring SSL. Remove or comment this section once
    # HTTPS is working.

    # API requests → backend
    location /api {
        proxy_pass http://backend_server;

        # Pass original client information to the backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed in the future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Uploaded blog images
    location /uploads {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Profile pictures
    location /profile {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Default profile image
    location = /default.png {
        proxy_pass http://backend_server;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else — frontend is on Vercel, so return a message.
    location / {
        default_type application/json;
        return 404 '{"status":404,"message":"BlogBubble API. Frontend is hosted separately."}';
    }
}

