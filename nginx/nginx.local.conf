# ============================================================
# BlogBubble — Nginx for Frontend SPA (Local Development)
# ============================================================
# This config is used inside the frontend Docker container to
# serve the Vite-built React application as a single-page app.
#
# Key behaviour:
#   - All routes fall back to /index.html so React Router can
#     handle client-side navigation (try_files).
#   - Gzip compression is enabled for faster local loading.
#
# This is NOT a reverse proxy — the backend runs on its own
# container and port. The frontend calls the backend via the
# VITE_API_URL environment variable.
# ============================================================

server {
    listen 80;
    listen [::]:80;

    server_name localhost;

    # Root directory where the built frontend files are copied
    # (typically via COPY in the Dockerfile).
    root /usr/share/nginx/html;

    # Default file to serve.
    index index.html;

    # ----- SPA Routing -----
    # React Router uses client-side routes like /blog/123 that
    # don't correspond to actual files on disk. This directive
    # tries the requested URI as a file, then as a directory,
    # and finally falls back to /index.html so React can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Gzip Compression -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ----- Cache Static Assets -----
    # Vite adds content hashes to filenames, so aggressive caching
    # is safe — a new build produces new filenames.
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----- Error Pages -----
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
